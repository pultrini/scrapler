name: CI-Scrapler

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Cache go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum' }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -v -race -timout 30s

      - name: Build
        run: go build ./...